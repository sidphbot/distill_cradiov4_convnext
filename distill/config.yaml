seed: 42
mode: full  # full | debug

model:
  student_variant: small
  student_models:
    tiny: "convnext_tiny.dinov3_lvd1689m"
    small: "convnext_small.dinov3_lvd1689m"
  spatial_norm_cap: 50.0
  grad_checkpointing: false



teacher:
  id: "nvidia/C-RADIOv4-H"
  amp: true

data:
  data_list: ""
  image_dir: ""
  val_frac: 0.02
  size: 416
  patch_size: 16
  train_cap: 0
  val_cap: 0
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

dataloader:
  batch_size: 32
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 8

training:
  epochs: 20
  lr: 1.5e-4
  wd: 0.08
  amp: true
  grad_accum: 4
  grad_clip: 1.0
  optimizer:
    betas: [0.9, 0.999]
    eps: 1.0e-8

loss:
  lambda_summary: 1.0
  lambda_spatial: 1.0
  lambda_mse: 0.25
  lambda_consistency_summary: 0.5
  lambda_consistency_spatial: 0.5
  grad_eps: 1.0e-3
  ramp:
    mse_sp_w: { start: 0.5, end: 1.5, warmup_frac: 0.2 }
    grad_w:   { start: 0.1, end: 1.3, warmup_frac: 0.35 }
    steps_per_epoch: 3800

augmentation:
  warmup_steps: 4000
  p_start: 0.0
  p_end: 0.6
  pipeline:
    transform:
      __class_fullname__: albumentations.core.composition.Compose
      transforms:
        - __class_fullname__: albumentations.augmentations.transforms.RandomBrightnessContrast
          brightness_limit: 0.1
          contrast_limit: 0.1
          brightness_by_max: true
          p: 0.4
        - __class_fullname__: albumentations.augmentations.transforms.HueSaturationValue
          hue_shift_limit: 7
          sat_shift_limit: 25
          val_shift_limit: 0
          p: 0.3
        - __class_fullname__: albumentations.augmentations.transforms.GaussianBlur
          blur_limit: [3, 5]
          sigma_limit: [0.1, 0.5]
          p: 0.3
        - __class_fullname__: albumentations.augmentations.transforms.GaussNoise
          var_limit: [0.0, 26.0]
          p: 0.3

logging:
  log_every: 50
  eval_every: 500
  eval_batches: 50
  image_log_multiplier: 5
  image_grid: { nrow: 4, n: 8 }
  val_spatial_compare: { batch_mod: 3, max_batches: 15, max_side: 512 }
  mem_track_interval: 500
  quantiles: [0.05, 0.95]

experiment:
  root: "/home/burplord/experiments/"
  suffix: ""

# Applied as overlay when mode == "debug"
debug:
  data: { train_cap: 5000, val_cap: 1000 }
  logging: { eval_every: 5, eval_batches: 5 }
