seed: 42
mode: full  # full | debug

model:
  student_variant: tiny
  student_models:
    tiny: "convnext_tiny.dinov3_lvd1689m"
    small: "convnext_small.dinov3_lvd1689m"
  spatial_norm_cap: 80.0
  grad_checkpointing: false



teacher:
  id: "nvidia/C-RADIOv4-H"
  amp: true

data:
  image_dir: "/media/burplord/kraken_data/oidv7"           # training images directory
  val_frac: 0.02          # fraction of image_dir held out as oi_val
  val_sources:            # named off-distribution val directories
    coco_train: "/media/burplord/kraken_data/off_domain_data/coco/train"
    imagenet_train: "/media/burplord/kraken_data/off_domain_data/imagenet/train"
  size: 416
  patch_size: 16
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]



dataloader:
  batch_size: 48
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4

training:
  epochs: 20
  lr: 1.5e-4
  wd: 0.08
  amp: true
  grad_accum: 4
  grad_clip: 1.0
  optimizer_type: adamw_muon  # adamw | adamw_muon
  optimizer:
    betas: [0.9, 0.999]
    eps: 1.0e-8
  muon:
    lr: 0.02
    momentum: 0.95
    nesterov: true
    ns_steps: 5
  scheduler:
    type: cosine          # cosine | none
    warmup_steps: 500     # lr warmup from 0 → peak (in optimizer steps)
    min_lr_ratio: 0.01    # min_lr = lr * min_lr_ratio at end of training

loss:
  lambda_summary: 0.8
  lambda_spatial: 2.0     # boosted from 1.5 — prioritize dense spatial features
  lambda_mse: 0.5
  grad_eps: 1.0e-3
  ramp:
    mse_sp:       { start: 0.5, end: 2.5, warmup_frac: 0.02 }   # boosted from 1.5 — push per-position alignment
    grad:         { start: 0.3, end: 4.0, warmup_frac: 0.025 }   # boosted from 2.0 — edge-aware features
    cons_summary: { start: 0.0, end: 0.3, warmup_frac: 0.015 }
    cons_spatial: { start: 0.0, end: 1.5, warmup_frac: 0.025 }   # boosted from 0.7 — off-dist generalization

augmentation:
  warmup_frac: 0.25
  strength_start: 0.0
  strength_end: 0.6
  pipeline:
    transform:
      __class_fullname__: albumentations.core.composition.Compose
      transforms:
        - __class_fullname__: albumentations.augmentations.transforms.RandomBrightnessContrast
          brightness_limit: 0.2
          contrast_limit: 0.2
          brightness_by_max: true
          p: 0.5
        - __class_fullname__: albumentations.augmentations.transforms.HueSaturationValue
          hue_shift_limit: 12
          sat_shift_limit: 35
          val_shift_limit: 0
          p: 0.4
        - __class_fullname__: albumentations.augmentations.transforms.GaussianBlur
          blur_limit: [3, 5]
          sigma_limit: [0.1, 0.5]
          p: 0.3
        - __class_fullname__: albumentations.augmentations.transforms.GaussNoise
          var_limit: [0.0, 26.0]
          p: 0.3

logging:
  log_every: 2
  eval_every: 100
  eval_batches: 15
  image_log_multiplier: 100
  image_grid: { nrow: 4, n: 8 }
  val_spatial_compare: { batch_mod: 1, max_batches: 1, max_side: 512 }
  mem_track_interval: 500
  quantiles: [0.05, 0.95]

hotcb:
  enabled: true
  key_metric: val_alignment_score
  debounce_steps: 10

experiment:
  root: "/home/burplord/experiments/"
  suffix: "hotcb_full_distill"

# Applied as overlay when mode == "debug"
debug:
  data: { train_cap: 5000, val_cap: 1000 }
  logging: { eval_every: 5, eval_batches: 5 }
